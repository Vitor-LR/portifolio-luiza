<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 470" width="460" height="470">
  <defs>
    <linearGradient id="olv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#aebd6a"/>
      <stop offset="0.45" stop-color="#5c6a2c"/>
      <stop offset="1" stop-color="#274703"/>
    </linearGradient>
    <radialGradient id="fade" cx="48%" cy="46%" r="60%">
      <stop offset="0" stop-color="#fff" stop-opacity="1"/>
      <stop offset="0.7" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="m"><rect width="460" height="470" fill="url(#fade)"/></mask>
  </defs>
  <g mask="url(#m)" fill="url(#olv)">
    <!-- haste + base (fixas, verticais) -->
    <rect x="223" y="104" width="14" height="252" rx="6"/>
    <path d="M188 356 H272 L290 398 H170 Z"/>
    <rect x="160" y="396" width="140" height="20" rx="9"/>
    <rect x="140" y="414" width="180" height="16" rx="8"/>
    <circle cx="230" cy="98" r="13"/>
    <!-- viga + pratos: GIRADOS (desequilíbrio/movimento) -->
    <g transform="rotate(-13 230 100)">
      <rect x="78" y="93" width="304" height="14" rx="7"/>
      <circle cx="80" cy="100" r="10"/><circle cx="380" cy="100" r="10"/>
      <!-- corrente esq (mais longa) + prato mais BAIXO -->
      <g stroke="url(#olv)" stroke-width="4" fill="none" stroke-linecap="round">
        <path d="M80 108 L56 232 M80 108 L104 232"/>
        <path d="M380 108 L358 176 M380 108 L402 176"/>
      </g>
      <path d="M40 224 Q80 290 120 224 Z"/>
      <path d="M340 168 Q380 226 420 168 Z"/>
    </g>
  </g>
</svg>
